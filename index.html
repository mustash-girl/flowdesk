<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlowDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0F0F1A;color:#E8E6F0;font-family:'Nunito',system-ui,sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2E2B45;border-radius:99px;}
input,select,textarea,button{font-family:inherit;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;border:1px solid;white-space:nowrap;}
.card{background:#1C1C30;border-radius:13px;padding:15px 17px;}
.btn-ghost{background:#232338;color:#A899FF;border:1px solid #2E2B45;border-radius:9px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-primary{background:#7B6FFF;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-sm{padding:6px 13px;font-size:12px;}
.inp{width:100%;padding:9px 13px;border-radius:9px;border:1.5px solid #2E2B45;font-size:14px;outline:none;background:#232338;color:#F0EEF8;box-sizing:border-box;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,Fragment}=React;

// ── Palette ───────────────────────────────────────────────────────────────────
const R={
  red:   {h:"#FF4D4D",bg:"#2A1010",b:"#7A1A1A",t:"#FF8080"},
  orange:{h:"#FF8C42",bg:"#2A1600",b:"#7A3A00",t:"#FFB07A"},
  yellow:{h:"#FFD600",bg:"#2A2000",b:"#7A5500",t:"#FFE566"},
  green: {h:"#3DCC7E",bg:"#0A2018",b:"#1A5A30",t:"#70EDAA"},
  blue:  {h:"#4D9FFF",bg:"#0A1828",b:"#1A3A6A",t:"#80BFFF"},
  indigo:{h:"#7B6FFF",bg:"#121028",b:"#2E236A",t:"#A899FF"},
  violet:{h:"#CC55FF",bg:"#1E0A28",b:"#5A1A7A",t:"#E099FF"},
  pink:  {h:"#FF6EC7",bg:"#2A0A1E",b:"#7A1A55",t:"#FF9FDD"},
  teal:  {h:"#2ECFD4",bg:"#041E20",b:"#0A5A60",t:"#5EEEF3"},
  grey:  {h:"#B0AAC8",bg:"#1A1A2A",b:"#3A3855",t:"#D0CCEC"},
};
const D={bg0:"#0F0F1A",bg1:"#16162A",bg2:"#1C1C30",bg3:"#232338",bd:"#2E2B45",t1:"#F0EEF8",t2:"#C8C4E0",t3:"#8A87A8"};
const RB="linear-gradient(90deg,#FF4D4D,#FF8C42,#FFD600,#3DCC7E,#4D9FFF,#7B6FFF,#CC55FF)";
const RC=["#FF4D4D","#FF8C42","#FFD600","#3DCC7E","#4D9FFF","#7B6FFF","#CC55FF"];// rainbow by dow

// ── System data (editable in settings) ───────────────────────────────────────
const DEF_CATS=[
  {id:"accounting",name:"ACCOUNTING",icon:"💰",ramp:"yellow"},
  {id:"operations",name:"OPERATIONS",icon:"⚙️",ramp:"orange"},
  {id:"nst",  name:"NST",  icon:"🚚",ramp:"blue"},
  {id:"sweetpac",  name:"SWEETPAC",  icon:"📦",ramp:"violet"},
  {id:"safety",    name:"SAFETY",    icon:"🛡️",ramp:"red"},
  {id:"misc",  name:"MISC",  icon:"📋",ramp:"grey"},
  {id:"analytics", name:"ANALYTICS", icon:"📊",ramp:"yellow"},
  {id:"dashboard2",name:"DASHBOARD", icon:"🖥️",ramp:"indigo"},
  {id:"workflow",  name:"WORKFLOW",  icon:"🔄",ramp:"green"},
  {id:"automation",name:"AUTOMATION",icon:"⚡",ramp:"indigo"},
  {id:"claude",    name:"CLAUDE",    icon:"🤖",ramp:"violet"},
  {id:"mcleod",    name:"MCLEOD",    icon:"🗂️",ramp:"teal"},
  {id:"other",  name:"OTHER",  icon:"📌",ramp:"grey"},
  {id:"personal",  name:"PERSONAL",  icon:"🏠",ramp:"pink"},
];
const DEPT_IDS=DEF_CATS.slice(0,6).map(c=>c.id);
const TAG_IDS= DEF_CATS.slice(6).map(c=>c.id);

const DEF_STATUSES=[
  {id:"todo",    name:"To Do",  icon:"○",ramp:"blue"},
  {id:"inprog",  name:"In Progress",icon:"▶",ramp:"green"},
  {id:"block",   name:"Roadblock",  icon:"⚠",ramp:"pink"},
  {id:"testing", name:"In Review",icon:"💬",ramp:"yellow"},
  {id:"parked",  name:"Parked",  icon:"⏸",ramp:"orange"},
  {id:"complete",name:"Complete",   icon:"✓",ramp:"grey"},
];

const DEF_TOOLS=[
  {id:"croptracker", name:"Croptracker",  icon:"🌱"},
  {id:"netsuite",    name:"Netsuite",  icon:"📊"},
  {id:"mcleod",  name:"McLeod Tables",icon:"🗂️"},
];

const TYPES=["Task","Appointment","Meeting","Other"];
const TM={"Task":{t:R.blue.t,bg:R.blue.bg,b:R.blue.b,icon:"📌"},"Appointment":{t:R.violet.t,bg:R.violet.bg,b:R.violet.b,icon:"📅"},"Meeting":{t:R.green.t,bg:R.green.bg,b:R.green.b,icon:"🤝"},"Other":{t:R.grey.t,bg:R.grey.bg,b:R.grey.b,icon:"📋"}};
const FM={work:{l:"Work",bg:R.blue.bg,t:R.blue.t,b:R.blue.b},personal:{l:"Personal",bg:R.violet.bg,t:R.violet.t,b:R.violet.b}};

// ── Utils ─────────────────────────────────────────────────────────────────────
const uid=()=>Date.now()+Math.random().toString(36).slice(2);
const fmtD=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${m}/${day}/${y}`;};
const today=()=>new Date().toISOString().slice(0,10);
const mkD=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const due=d=>d?Math.ceil((new Date(d)-new Date(today()))/86400000):999;
const snoozed=t=>t.snoozedUntil&&t.snoozedUntil>today();
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};
const ramp=n=>R[n]||R.grey;
const cat=(cats,id)=>cats.find(c=>c.id===id)||(id==='_deleted'?{id:'_deleted',name:'DELETED',icon:'🗑',ramp:'grey'}:cats.find(c=>c.id==='other')||cats[0]);
const sname=(statuses,n)=>statuses.find(s=>s.name===n)||statuses[0];

// ── Sample data ───────────────────────────────────────────────────────────────
const T0=today();
const INIT_TASKS=[
  {id:1,title:"Route optimization audit",  deptId:"operations",status:"In Progress",flag:"work",type:"Task",priority:true, due:mkD(6), start:mkD(-7),tags:["analytics","workflow"],notes:"Review last 3 months of route data",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:2,title:"Driver onboarding docs",  deptId:"operations",status:"To Do",  flag:"work",type:"Task",priority:false,due:mkD(14),start:mkD(4), tags:["workflow"],  notes:"",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:3,title:"Carrier contract renewal",   deptId:"operations",status:"Roadblock",  flag:"work",type:"Task",priority:true, due:mkD(3), start:mkD(-12),tags:["mcleod"],  notes:"Waiting on legal review",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:4,title:"Warehouse layout redesign",  deptId:"safety",    status:"Parked",  flag:"work",type:"Task",priority:false,due:mkD(35),start:mkD(19),tags:["other"],  notes:"",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:5,title:"Q3 KPI dashboard",  deptId:"accounting",status:"In Review",    flag:"work",type:"Task",priority:false,due:mkD(19),start:mkD(4), tags:["dashboard2","analytics"],notes:"",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:6,title:"Annual vehicle inspection",  deptId:"safety",    status:"Complete",   flag:"work",type:"Appointment",priority:false,due:mkD(-7),start:mkD(-17),tags:["analytics"],notes:"",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:7,title:"Dentist appointment",  deptId:"misc",  status:"To Do",  flag:"personal",type:"Appointment",priority:false,due:mkD(9),start:mkD(9),tags:["personal"],notes:"Downtown Dental, 9am",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:8,title:"Book team offsite venue",    deptId:"sweetpac",  status:"In Progress",flag:"work",type:"Meeting",priority:false,due:mkD(24),start:mkD(-2),tags:["other"],notes:"",snoozedUntil:null,attachments:[],tools:[],updates:[]},
  {id:9,title:"Automation pipeline build",  deptId:"nst",  status:"To Do",  flag:"work",type:"Task",priority:true, due:mkD(10),start:mkD(1), tags:["automation","claude"],  notes:"Claude integration for dispatch",snoozedUntil:null,attachments:[],tools:[],updates:[]},
];
const INIT_EVENTS=[
  {id:1,title:"Fleet ops standup",    date:mkD(1), time:"09:00",flag:"work",    contact:"Team",  type:"Meeting",    masterFileId:null},
  {id:2,title:"Carrier contract call",date:mkD(3), time:"14:00",flag:"work",    contact:"TruckCo",  type:"Meeting",    masterFileId:2},
  {id:3,title:"Dentist",  date:mkD(9), time:"09:15",flag:"personal",contact:"Downtown Dental",type:"Appointment",masterFileId:1},
  {id:4,title:"Q3 planning all-hands",date:mkD(14),time:"10:00",flag:"work",    contact:"",  type:"Meeting",    masterFileId:null},
  {id:5,title:"Driver safety training",date:mkD(16),time:"13:30",flag:"work",   contact:"",  type:"Appointment",masterFileId:null},
];
const INIT_NOTES=[
  {id:1,title:"Carrier negotiation points",content:"Emphasize volume commitments. Ask about fuel surcharge caps.",tags:["mcleod"],pinned:true, created:T0,folder:"work",attachments:[]},
  {id:2,title:"Warehouse layout ideas",    content:"Move staging area closer to dock 3. Consider vertical shelving.",tags:["other"],pinned:false,created:T0,folder:"work",attachments:[]},
  {id:3,title:"Grocery list",  content:"Milk, eggs, bread, coffee.",tags:["personal"],pinned:false,created:T0,folder:"personal",attachments:[]},
];
const INIT_IDEAS=[
  {id:1,title:"Real-time driver tracking",   detail:"Live map showing all drivers with ETA overlays.",priority:false,attachments:[]},
  {id:2,title:"Automated carrier scorecards",detail:"Monthly report auto-generated from delivery data.",priority:true,attachments:[]},
  {id:3,title:"Cross-dock partner portal",   detail:"Let partners submit availability directly.",priority:false,attachments:[]},
];
const INIT_CONTACTS=[
  {id:1,name:"Downtown Dental",  address:"123 Main St, Fort Worth TX",    phone:"817-555-0110",email:"info@downtowndental.com",hours:"Mon–Fri 8am–5pm",type:"personal"},
  {id:2,name:"Fort Worth Fleet Repairs",address:"88 Commerce Dr, Fort Worth TX", phone:"817-555-0330",email:"service@fwfleet.com",    hours:"Mon–Sat 7am–7pm",type:"work"},
  {id:3,name:"TruckCo Logistics",  address:"500 Industrial Blvd, Dallas TX", phone:"214-555-0220",email:"contracts@truckco.com",  hours:"Mon–Fri 7am–6pm",type:"work"},
];

// ── Shared tiny components ────────────────────────────────────────────────────
const Chip=({bg,b,t,children})=><span className="chip" style={{background:bg,borderColor:b,color:t}}>{children}</span>;
const CatChip=({cats,id})=>{const c=cat(cats,id),r=ramp(c.ramp);return<Chip bg={r.bg} b={r.b} t={r.t}>{c.icon} {c.name}</Chip>;};
const SBadge=({statuses,n})=>{const s=sname(statuses,n),r=ramp(s.ramp);return<Chip bg={r.bg} b={r.b} t={r.h}>{s.icon} {n}</Chip>;};
const FChip=({flag})=>{const f=FM[flag]||FM.work;return<Chip bg={f.bg} b={f.b} t={f.t}>{f.l}</Chip>;};
const TChip=({type})=>{const m=TM[type]||TM.Task;return<Chip bg={m.bg} b={m.b} t={m.t}>{m.icon} {type}</Chip>;};
const PBadge=()=><Chip bg={R.red.bg} b={R.red.b} t={R.red.t}>🔴 Priority</Chip>;
const TagPip=({cats,id})=>{const c=cat(cats,id),r=ramp(c.ramp);return<span style={{fontSize:10,fontWeight:700,background:r.bg,color:r.t,border:`1px solid ${r.b}`,padding:"1px 6px",borderRadius:99,whiteSpace:"nowrap"}}>{c.icon} {c.name}</span>;};

function Btn({children,onClick,variant="primary",sm=false,style:s={}}){
  const styles={primary:{background:R.indigo.h,color:"#fff"},ghost:{background:D.bg3,color:R.indigo.t,border:`1px solid ${D.bd}`},danger:{background:R.red.bg,color:R.red.t,border:`1px solid ${R.red.b}`}};
  return<button onClick={onClick} style={{cursor:"pointer",border:"none",borderRadius:9,fontFamily:"inherit",fontWeight:700,display:"inline-flex",alignItems:"center",gap:6,padding:sm?"6px 13px":"9px 18px",fontSize:sm?12:14,...(styles[variant]||styles.primary),...s}}>{children}</button>;
}
function Modal({title,onClose,children,wide}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
  <div style={{background:D.bg2,borderRadius:16,padding:"24px 26px",maxWidth:wide?800:560,width:"100%",border:`1px solid ${D.bd}`,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
  <span style={{fontSize:17,fontWeight:800,color:D.t1}}>{title}</span>
  <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:D.t3}}>×</button>
  </div>
  {children}
  </div>
    </div>
  );
}
const Lbl=({children})=><div style={{fontSize:11,fontWeight:700,color:D.t2,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{children}</div>;
function FInp({label,value,onChange,type="text",placeholder=""}){return<div style={{marginBottom:12}}>{label&&<Lbl>{label}</Lbl>}<input className="inp" type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/></div>;}
function FTxt({label,value,onChange,rows=3}){return<div style={{marginBottom:12}}>{label&&<Lbl>{label}</Lbl>}<textarea className="inp" value={value} onChange={e=>onChange(e.target.value)} rows={rows} style={{resize:"vertical"}}/></div>;}
function FSel({label,value,onChange,opts}){return<div style={{marginBottom:12}}>{label&&<Lbl>{label}</Lbl>}<select className="inp" style={{cursor:"pointer"}} value={value} onChange={e=>onChange(e.target.value)}>{opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}</select></div>;}
function TimePick({label,value,onChange}){
  const slots=[];for(let h=0;h<24;h++)for(let m=0;m<60;m+=15){const hh=String(h).padStart(2,"0"),mm=String(m).padStart(2,"0");slots.push(`${hh}:${mm}`);}
  return<div style={{marginBottom:12}}>{label&&<Lbl>{label}</Lbl>}<select className="inp" style={{cursor:"pointer"}} value={value||""} onChange={e=>onChange(e.target.value)}><option value="">—</option>{slots.map(s=>{const[h,m]=s.split(":").map(Number);const ap=h<12?"AM":"PM";const h12=h===0?12:h>12?h-12:h;return<option key={s} value={s}>{`${h12}:${String(m).padStart(2,"0")} ${ap}`}</option>;})}</select></div>;
}
function Attach({files=[],onChange}){
  function add(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const n=[...files,{id:uid(),name:f.name,size:f.size,type:f.type,dataUrl:ev.target.result}];onChange(n);};r.readAsDataURL(f);}
  const fmt=b=>b>1048576?(b/1048576).toFixed(1)+"MB":b>1024?(b/1024).toFixed(0)+"KB":b+"B";
  return(
    <div style={{marginBottom:12}}>
  <Lbl>Attachments</Lbl>
  {files.map(f=>(
  <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:D.bg3,borderRadius:8,padding:"6px 10px",marginBottom:5,border:`1px solid ${D.bd}`}}>
  <span style={{fontSize:12,color:D.t1}}>{f.type.startsWith("image/")?"🖼️":f.type.includes("pdf")?"📄":"📎"} {f.name} <span style={{color:D.t3}}>({fmt(f.size)})</span></span>
  <div style={{display:"flex",gap:8}}>
  {f.type.startsWith("image/")&&<a href={f.dataUrl} target="_blank" style={{fontSize:12,color:R.blue.t,fontWeight:600}}>View</a>}
  <button onClick={()=>onChange(files.filter(x=>x.id!==f.id))} style={{background:"none",border:"none",cursor:"pointer",color:R.red.t,fontSize:13}}>🗑</button>
  </div>
  </div>
  ))}
  <label style={{display:"flex",alignItems:"center",gap:8,background:D.bg3,border:`1.5px dashed ${D.bd}`,borderRadius:9,padding:"7px 12px",cursor:"pointer",fontSize:13,color:D.t2}}>
  📎 Add attachment<input type="file" onChange={add} style={{display:"none"}}/>
  </label>
    </div>
  );
}
function CatPick({cats,deptIds,value,onChange}){
  const depts=cats.filter(c=>deptIds.includes(c.id));
  return<div style={{marginBottom:12}}><Lbl>Department</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{depts.map(c=>{const r=ramp(c.ramp);return<button key={c.id} onClick={()=>onChange(c.id)} style={{background:value===c.id?r.bg:D.bg3,color:value===c.id?r.t:D.t3,border:`1.5px solid ${value===c.id?r.b:D.bd}`,borderRadius:9,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>{c.icon} {c.name}</button>;})}</div></div>;
}
function TagPick({cats,tagIds,value,onChange}){
  const tags=cats.filter(c=>tagIds.includes(c.id));
  return<div style={{marginBottom:12}}><Lbl>Tags</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{tags.map(c=>{const sel=value.includes(c.id),r=ramp(c.ramp);return<button key={c.id} onClick={()=>onChange(sel?value.filter(x=>x!==c.id):[...value,c.id])} style={{background:sel?r.bg:D.bg3,color:sel?r.t:D.t3,border:`1.5px solid ${sel?r.b:D.bd}`,borderRadius:9,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>{c.icon} {c.name}</button>;})}</div></div>;
}
function MFSel({contacts,value,onChange}){
  // Use string comparison to avoid number/string mismatch
  const strVal=value!=null?String(value):"";
  const mf=contacts.find(x=>String(x.id)===strVal);
  return<div style={{marginBottom:12}}><Lbl>Link master file</Lbl>
    <select className="inp" style={{cursor:"pointer"}} value={strVal} onChange={e=>onChange(e.target.value||null)}>
  <option value="">— None —</option>{contacts.map(c=><option key={c.id} value={String(c.id)}>{c.name}</option>)}
    </select>
    {mf&&<div style={{marginTop:6,background:D.bg3,borderRadius:8,padding:"8px 12px",fontSize:12,color:D.t2}}>{mf.phone&&<div>📞 {mf.phone}</div>}{mf.email&&<div>✉️ {mf.email}</div>}{mf.address&&<div>📍 {mf.address}</div>}</div>}
  </div>;
}
function TaskForm({initial,onSave,onCancel,contacts,cats,deptIds,tagIds,statuses,tools}){
  const bl={title:"",deptId:deptIds[0],flag:"work",type:"Task",priority:false,due:"",start:today(),notes:"",tags:[],status:"To Do",snoozedUntil:null,masterFileId:null,attachments:[],tools:[],collab:"",updates:[]};
  const[form,setF]=useState(initial||bl);
  const f=(k,v)=>setF(p=>({...p,[k]:v}));
  const ci={padding:"6px 10px",borderRadius:8,border:"1.5px solid #3A3860",fontSize:13,outline:"none",background:D.bg3,color:D.t1,width:"100%",boxSizing:"border-box",fontFamily:"inherit"};
  const cl={fontSize:10,fontWeight:700,color:D.t2,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.06em",display:"block"};

  return<div>
    <div style={{marginBottom:8}}>
  <label style={cl}>Department</label>
  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
  {cats.filter(c=>deptIds.includes(c.id)).map(c=>{const r=ramp(c.ramp);return<button key={c.id} type="button" onClick={()=>f("deptId",c.id)} style={{background:form.deptId===c.id?r.bg:D.bg3,color:form.deptId===c.id?r.t:D.t3,border:`1.5px solid ${form.deptId===c.id?r.b:"#3A3860"}`,borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>{c.icon} {c.name}</button>;})}
  </div>
    </div>
    <div style={{marginBottom:8}}><label style={cl}>Title</label><input style={ci} value={form.title} onChange={e=>f("title",e.target.value)} placeholder="Task name"/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"0 10px"}}>
  <div style={{marginBottom:8}}><label style={cl}>Status</label><select style={{...ci,cursor:"pointer"}} value={form.status||"To Do"} onChange={e=>f("status",e.target.value)}>{statuses.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select></div>
  <div style={{marginBottom:8}}><label style={cl}>Flag</label><select style={{...ci,cursor:"pointer"}} value={form.flag} onChange={e=>f("flag",e.target.value)}><option value="work">Work</option><option value="personal">Personal</option></select></div>
  <div style={{marginBottom:8}}><label style={cl}>Due</label><input style={ci} type="date" value={form.due} onChange={e=>f("due",e.target.value)}/></div>
  <div style={{marginBottom:8}}><label style={cl}>Start</label><input style={ci} type="date" value={form.start} onChange={e=>f("start",e.target.value)}/></div>
    </div>
    <div style={{marginBottom:8}}>
  <label style={cl}>Tags</label>
  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>

// ── Reminder Banner ───────────────────────────────────────────────────────────
function RemBanner({tasks,setTasks,cats,logActivity}){
  const active=tasks.filter(t=>t.priority&&t.status==="In Progress"&&!snoozed(t));
  const[dismissed,setD]=useState(false);
  if(!active.length||dismissed)return null;
  function snz(id,days){setTasks(p=>p.map(t=>t.id===id?{...t,snoozedUntil:addD(today(),days)}:t));const t=tasks.find(x=>x.id===id);if(t)logActivity(`Snoozed "${t.title}" ${days}d`,"💤");}
  return<div style={{background:R.orange.bg,border:`1.5px solid ${R.orange.b}`,borderRadius:13,padding:"12px 16px",marginBottom:18}}>
    <div style={{display:"flex",justifyContent:"space-between"}}>

  <button onClick={()=>setD(true)} style={{background:"none",border:"none",cursor:"pointer",color:D.t3,fontSize:16}}>×</button>

// ── Dashboard panels (draggable) ──────────────────────────────────────────────
function DashPanels({tasks,events,log,prios,upcoming,scount,cats,statuses}){

  const[overId,setOverId]=useState(null);

  const handle=<span style={{position:"absolute",top:9,right:11,fontSize:13,color:D.t3,opacity:0.4,cursor:"grab",userSelect:"none"}}>⠿</span>;
  const base={background:D.bg2,borderRadius:14,padding:18,border:`1px solid ${D.bd}`,position:"relative"};
  function panel(id){
    if(id==="status")return<div style={base}>{handle}<div style={{fontSize:13,fontWeight:700,color:D.t1,marginBottom:12}}>📊 Status breakdown</div>
  {scount.map(({s,count})=>{const r=ramp(s.ramp),pct=tasks.length?Math.round(count/tasks.length*100):0;return<div key={s.name} style={{marginBottom:8}}>
  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,color:r.h,fontWeight:600}}>{s.icon} {s.name}</span><span style={{fontSize:12,color:D.t3}}>{count}</span></div>
  <div style={{background:D.bg3,borderRadius:99,height:5}}><div style={{background:r.h,width:`${pct}%`,height:"100%",borderRadius:99}}/></div>
  </div>;})}
    </div>;
    if(id==="activity")return<div style={base}>{handle}<div style={{fontSize:13,fontWeight:700,color:D.t1,marginBottom:12}}>🕐 Recent activity</div>
  <div style={{maxHeight:190,overflowY:"auto"}}>{log.length===0?<div style={{color:D.t3,fontSize:13}}>No activity yet</div>:log.map(a=><div key={a.id} style={{display:"flex",gap:8,marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${D.bg3}`}}><span style={{fontSize:14}}>{a.icon}</span><div><div style={{fontSize:12,color:D.t1}}>{a.text}</div><div style={{fontSize:10,color:D.t3}}>{a.time}</div></div></div>)}</div>
    </div>;

  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><SBadge statuses={statuses} n={t.status}/>{t.due&&<span style={{fontSize:11,color:due(t.due)<0?R.red.t:D.t2}}>Due {fmtD(t.due)}</span>}{snoozed(t)&&<span style={{fontSize:11,color:D.t3}}>💤 until {fmtD(t.snoozedUntil)}</span>}</div>
  </div>)}
    </div>;
    if(id==="upcoming")return<div style={base}>{handle}<div style={{fontSize:13,fontWeight:700,color:R.blue.t,marginBottom:12}}>📅 Upcoming 7 days</div>
  {upcoming.length===0?<div style={{color:D.t3,fontSize:13}}>Clear schedule</div>:upcoming.map(e=><div key={e.id} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid #48456A",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
  <div><div style={{fontSize:13,fontWeight:600,color:D.t1}}>{e.title}</div><div style={{fontSize:11,color:D.t3,marginTop:2}}>{fmtD(e.date)}{e.time?` at ${e.time}`:""}</div></div>
  <div style={{display:"flex",gap:4}}><FChip flag={e.flag}/><TChip type={e.type||"Meeting"}/></div>
  </div>)}
    </div>;
    return null;
  }
  return<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

// ── Task Updates (project log) ────────────────────────────────────────────────
function TaskUpdates({task,onSave}){
  const[text,setText]=useState("");
  const[editingId,setEditingId]=useState(null);
  const[editText,setEditText]=useState("");
  const updates=(task.updates||[]).slice().reverse(); // newest first

  function addUpdate(){
    if(!text.trim())return;
    const u={id:uid(),text:text.trim(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    onSave([...(task.updates||[]),u]);
    setText("");
  }
  function deleteUpdate(id){
    onSave((task.updates||[]).filter(u=>u.id!==id));
  }
  function saveEdit(id){
    onSave((task.updates||[]).map(u=>u.id===id?{...u,text:editText}:u));
    setEditingId(null);setEditText("");
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
  <div style={{fontSize:13,fontWeight:700,color:D.t1,marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${D.bd}`}}>
  🗒 Updates <span style={{fontSize:11,color:D.t3,fontWeight:400}}>({(task.updates||[]).length})</span>
  </div>
  {/* Input */}
  <div style={{marginBottom:14}}>
  <textarea value={text} onChange={e=>setText(e.target.value)}
  onKeyDown={e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))addUpdate();}}
  placeholder="Add an update… (Ctrl+Enter to save)"
  style={{width:"100%",padding:"8px 11px",borderRadius:9,border:`1.5px solid #3A3860`,fontSize:13,outline:"none",background:D.bg3,color:D.t1,resize:"vertical",fontFamily:"inherit",minHeight:72,boxSizing:"border-box"}}
  rows={3}/>
  <button onClick={addUpdate} disabled={!text.trim()}
  style={{marginTop:6,width:"100%",background:text.trim()?R.indigo.h:"#2A2A45",color:text.trim()?"#fff":D.t3,border:"none",borderRadius:8,padding:"7px",fontSize:13,fontWeight:700,cursor:text.trim()?"pointer":"default",fontFamily:"inherit"}}>
  ＋ Add update
  </button>
  </div>
  {/* Updates list */}
  <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:9}}>
  {updates.length===0&&(
  <div style={{color:D.t3,fontSize:13,textAlign:"center",padding:"24px 0",border:`1px dashed ${D.bd}`,borderRadius:9}}>No updates yet</div>
  )}
  {updates.map(u=>(
  <div key={u.id} style={{background:D.bg3,borderRadius:10,padding:"10px 12px",border:`1px solid ${D.bd}`,borderLeft:`3px solid ${R.indigo.h}`}}>
  {editingId===u.id?(
  <div>
  <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={3}
  style={{width:"100%",padding:"7px 10px",borderRadius:8,border:`1.5px solid ${R.indigo.b}`,fontSize:13,background:D.bg2,color:D.t1,resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:7}}/>
  <div style={{display:"flex",gap:7}}>
  <button onClick={()=>saveEdit(u.id)} style={{background:R.indigo.h,color:"#fff",border:"none",borderRadius:7,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
  <button onClick={()=>{setEditingId(null);setEditText("");}} style={{background:D.bg2,color:D.t2,border:`1px solid ${D.bd}`,borderRadius:7,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
  </div>
  </div>
  ):(
  <div>
  <div style={{fontSize:12,color:D.t1,lineHeight:1.5,marginBottom:6,whiteSpace:"pre-wrap"}}>{u.text}</div>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
  <span style={{fontSize:10,color:D.t3}}>{u.date}{u.time?` · ${u.time}`:""}</span>
  <div style={{display:"flex",gap:6}}>
  <button onClick={()=>{setEditingId(u.id);setEditText(u.text);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:R.blue.t,opacity:0.8,fontFamily:"inherit"}}>✏️</button>
  <button onClick={()=>deleteUpdate(u.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:R.red.t,opacity:0.7,fontFamily:"inherit"}}>🗑</button>
  </div>
  </div>
  </div>
  )}
  </div>
  ))}
  </div>
    </div>
  );
}

function ListView({tasks,cats,statuses,onEdit}){
  const[sort,setSort]=useState({k:"due",d:1});
  function tog(k){setSort(s=>s.k===k?{k,d:s.d*-1}:{k,d:1});}
  const si=k=>sort.k===k?(sort.d===1?" ↑":" ↓"):"";
  const rows=[...tasks].sort((a,b)=>{const d=sort.d;if(sort.k==="due")return((a.due||"9999")<(b.due||"9999")?-1:1)*d;if(sort.k==="title")return a.title.localeCompare(b.title)*d;if(sort.k==="status")return a.status.localeCompare(b.status)*d;if(sort.k==="dept")return(a.deptId||"").localeCompare(b.deptId||"")*d;return 0;});
  const th={padding:"6px 10px",fontSize:10,fontWeight:700,color:D.t3,textTransform:"uppercase",letterSpacing:"0.06em",cursor:"pointer",whiteSpace:"nowrap",background:D.bg1};
  const td={padding:"7px 10px",fontSize:12,color:D.t1,borderBottom:`1px solid ${D.bg3}`};
  return<div style={{overflowX:"auto"}}>
    <table style={{width:"100%",borderCollapse:"collapse",background:D.bg2,borderRadius:13,overflow:"hidden",border:`1px solid ${D.bd}`}}>
  <thead><tr>
  {[["",""],["Title","title"],["Dept","dept"],["Type",""],["Status","status"],["Flag",""],["Due","due"],["Pri",""],[""]].map(([h,k],i)=><th key={i} style={th} onClick={()=>k&&tog(k)}>{h}{k&&si(k)}</th>)}
  </tr></thead>
  <tbody>{rows.map(t=>{const c=cat(cats,t.deptId),r=ramp(c.ramp);return<tr key={t.id} onMouseEnter={e=>e.currentTarget.style.background=D.bg3} onMouseLeave={e=>e.currentTarget.style.background=""}>
  <td style={{...td,width:28,textAlign:"center"}}><span style={{fontSize:15}}>{c.icon}</span></td>
  <td style={{...td,fontWeight:600,maxWidth:170}}>{t.title}</td>
  <td style={td}><CatChip cats={cats} id={t.deptId}/></td>
  <td style={td}><TChip type={t.type||"Task"}/></td>
  <td style={td}><SBadge statuses={statuses} n={t.status}/></td>
  <td style={td}><FChip flag={t.flag}/></td>
  <td style={{...td,whiteSpace:"nowrap",color:t.status==="Complete"?D.t3:due(t.due)<0?R.red.t:due(t.due)<=3?R.orange.t:D.t2}}>{t.status!=="Complete"?fmtD(t.due):""}</td>
  <td style={{...td,textAlign:"center"}}>{t.priority?"🔴":""}</td>
  <td style={{...td,whiteSpace:"nowrap"}}><button onClick={()=>onEdit(t)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:R.indigo.t,fontWeight:700}}>Edit</button></td>
  </tr>;})}
  </tbody>
    </table>
  </div>;
}

function GanttView({tasks,cats,statuses}){
  const START=mkD(-17),DAYS=60,DW=26,RH=38,LW=190;
  function off(d){return Math.max(0,Math.round((new Date(d)-new Date(START))/86400000));}
  const tOff=off(today());
  const months=[];let dd=new Date(START);for(let i=0;i<DAYS;i++){if(dd.getDate()===1||i===0)months.push({label:dd.toLocaleString("default",{month:"short"})+" "+dd.getFullYear(),o:i});dd.setDate(dd.getDate()+1);}
  return<div style={{overflowX:"auto"}}>
    <div style={{minWidth:LW+DAYS*DW}}>
  <div style={{display:"flex",borderBottom:`1px solid ${D.bd}`,paddingBottom:4,marginBottom:2}}>
  <div style={{width:LW,flexShrink:0,fontSize:11,color:D.t3,paddingLeft:8,fontWeight:700}}>Task</div>
  <div style={{position:"relative",width:DAYS*DW,flexShrink:0}}>
  {months.map((m,i)=><div key={i} style={{position:"absolute",left:m.o*DW,fontSize:10,fontWeight:700,color:R.indigo.t,top:0}}>{m.label}</div>)}
  <div style={{display:"flex",marginTop:16}}>{Array(DAYS).fill(0).map((_,i)=>{const d=new Date(START);d.setDate(d.getDate()+i);const wk=d.getDay()===0||d.getDay()===6;return<div key={i} style={{width:DW,flexShrink:0,fontSize:9,color:i===tOff?R.violet.h:wk?D.bd:D.t3,textAlign:"center",borderRight:`1px solid ${D.bg3}`,background:i===tOff?"rgba(123,111,255,0.1)":wk?"rgba(255,255,255,0.02)":"transparent"}}>{d.getDate()}</div>;})}</div>
  </div>
  </div>
  {tasks.filter(t=>t.start&&t.due).map((t,idx)=>{const c=cat(cats,t.deptId),r=ramp(c.ramp),o=off(t.start),w=Math.max(1,off(t.due)-o);return(
  <div key={t.id} style={{display:"flex",alignItems:"center",height:RH,borderBottom:`1px solid ${D.bg3}`,background:idx%2===0?D.bg2:D.bg1}}>
  <div style={{width:LW,flexShrink:0,fontSize:12,fontWeight:600,color:D.t1,paddingLeft:8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:6}}><span style={{color:r.h}}>{c.icon}</span><span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</span></div>
  <div style={{position:"relative",width:DAYS*DW,height:RH,flexShrink:0}}>
  <div style={{position:"absolute",left:tOff*DW+DW/2,top:0,width:2,height:RH,background:R.violet.h,opacity:0.5}}/>

  </div>
  </div>
  );})}

}
function Projects({tasks,setTasks,contacts,cats,deptIds,tagIds,statuses,logActivity,tools}){

  const TD_=today();
  const deptCats=cats.filter(c=>deptIds.includes(c.id)),tagCats=cats.filter(c=>tagIds.includes(c.id));
  const filtered=tasks.filter(t=>fDept==="all"||t.deptId===fDept).filter(t=>fType==="all"||t.type===fType).filter(t=>fTag==="all"||(t.tags||[]).includes(fTag)).filter(t=>!search||t.title.toLowerCase().includes(search.toLowerCase())).filter(t=>{if(fQuick==="prio")return t.priority&&t.status!=="Complete";if(fQuick==="overdue")return t.due&&t.due<TD_&&t.status!=="Complete";if(fQuick==="both")return(t.priority||( t.due&&t.due<TD_))&&t.status!=="Complete";return true;});
  function save(task){setTasks(p=>{const ex=p.find(t=>t.id===task.id);if(ex){logActivity(`Updated "${task.title}"`,"✏️");return p.map(t=>t.id===task.id?task:t);}logActivity(`Added "${task.title}"`,"➕");return[...p,task];});setShowAdd(false);setEditing(null);}
  function del(id){const t=tasks.find(x=>x.id===id);if(t)logActivity(`Deleted "${t.title}"`,"🗑");setTasks(p=>p.filter(t=>t.id!==id));setEditing(null);}
  function updS(id,status){const t=tasks.find(x=>x.id===id);if(t&&t.status!==status)logActivity(`Moved "${t.title}" → ${status}`,"🔀");setTasks(p=>p.map(t=>t.id===id?{...t,status}:t));}
  return<div style={{padding:"24px 0"}}>

  {[{id:"kanban",l:"⊞"},{id:"list",l:"☰"},{id:"table",l:"⊟"},{id:"gantt",l:"▬"}].map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:"5px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===v.id?R.indigo.bg:"transparent",color:view===v.id?R.indigo.t:D.t3}}>{v.l}</button>)}
  </div>

  </div>
    </div>
    {/* Filters */}
    <div style={{display:"flex",gap:7,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>

  <select value={fDept} onChange={e=>setFDept(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${D.bd}`,fontSize:13,background:D.bg3,color:D.t1,cursor:"pointer"}}>
  <option value="all">All depts</option>{deptCats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
  </select>

  <select value={fTag} onChange={e=>setFTag(e.target.value)} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${D.bd}`,fontSize:13,background:D.bg3,color:D.t1,cursor:"pointer"}}>
  <option value="all">All tags</option>{tagCats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
  </select>
    </div>
    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
  {[{id:"all",l:"All tasks"},{id:"prio",l:"🔴 Priority"},{id:"overdue",l:"⏰ Overdue"},{id:"both",l:"🔴⏰ Both"}].map(o=><button key={o.id} onClick={()=>setFQuick(o.id)} style={{padding:"4px 12px",borderRadius:99,fontSize:12,fontWeight:600,border:"1.5px solid",cursor:"pointer",background:fQuick===o.id?R.indigo.h:D.bg3,color:fQuick===o.id?"#fff":D.t2,borderColor:fQuick===o.id?R.indigo.h:D.bd}}>{o.l}</button>)}

    </div>

  <div key={sObj.id} style={{background:D.bg2,borderRadius:13,padding:"12px 10px",border:`1.5px solid ${dragOver===sObj.name?r.h:D.bd}`,transition:"border-color 0.2s",minWidth:0}}

  style={{background:D.bg3,borderRadius:10,padding:"10px 11px",marginBottom:8,border:`1.5px solid ${cr.b}`,cursor:"grab",transition:"all 0.15s"}}
  onMouseEnter={e=>{e.currentTarget.style.borderColor=cr.h;e.currentTarget.style.background="#1E1E35";}}
  onMouseLeave={e=>{e.currentTarget.style.borderColor=cr.b;e.currentTarget.style.background=D.bg3;}}>
  <div style={{marginBottom:4}}><CatChip cats={cats} id={t.deptId}/></div>
  <div style={{fontSize:12,fontWeight:800,color:D.t1,lineHeight:1.4,marginBottom:4}}>{t.title}</div>

  {t.due&&t.status!=="Complete"&&<div style={{fontSize:10,color:due(t.due)<0?R.red.t:due(t.due)<=3?R.orange.t:D.t3}}>📅 {fmtD(t.due)}{due(t.due)<0?" — overdue":""}</div>}
  </div>
  );})}
  {col.length===0&&<div style={{fontSize:11,color:D.t3,textAlign:"center",padding:"12px 0",border:`1px dashed ${D.bd}`,borderRadius:9}}>Drop here</div>}
  </div>
  );})}
    </div>}
    {view==="list" &&<ListView  tasks={filtered} cats={cats} statuses={statuses} onEdit={setEditing}/>}
    {view==="table"&&<TableView tasks={filtered} cats={cats} statuses={statuses} setTasks={setTasks}/>}
    {view==="gantt"&&<GanttView tasks={filtered} cats={cats} statuses={statuses}/>}
    {showAdd&&<Modal title="New task" onClose={()=>setShowAdd(false)} wide><TaskForm onSave={save} onCancel={()=>setShowAdd(false)} contacts={contacts} cats={cats} deptIds={deptIds} tagIds={tagIds} statuses={statuses} tools={tools}/></Modal>}
    {editing&&(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setEditing(null)}>
  <div style={{background:D.bg2,borderRadius:16,border:`1px solid ${D.bd}`,maxWidth:1020,width:"100%",maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
  {/* Header */}
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 24px 14px",borderBottom:`1px solid ${D.bd}`,flexShrink:0}}>
  <span style={{fontSize:17,fontWeight:800,color:D.t1}}>Edit task</span>
  <button onClick={()=>setEditing(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:D.t3}}>×</button>
  </div>

  {/* Left: TaskForm */}
  <div style={{overflowY:"auto",padding:"20px 24px",borderRight:`1px solid ${D.bd}`}}>
  <TaskForm initial={editing} onSave={t=>{save(t);}} onCancel={()=>setEditing(null)} contacts={contacts} cats={cats} deptIds={deptIds} tagIds={tagIds} statuses={statuses} tools={tools}/>
  <div style={{marginTop:8}}><Btn variant="danger" sm onClick={()=>del(editing.id)}>🗑 Delete</Btn></div>
  </div>
  {/* Right: Updates */}
  <div style={{overflowY:"auto",padding:"20px 20px",display:"flex",flexDirection:"column"}}>
  <TaskUpdates task={editing} onSave={updates=>{
  const updated={...editing,updates};
  setEditing(updated);
  setTasks(p=>p.map(t=>t.id===editing.id?updated:t));
  }}/>
  </div>
  </div>
  </div>
  </div>
    )}
    {promoted&&<Modal title="Edit promoted task" onClose={()=>setPromoted(null)} wide>
  <div style={{background:R.green.bg,border:`1px solid ${R.green.b}`,borderRadius:9,padding:"9px 13px",marginBottom:14,fontSize:13,color:R.green.t}}>✅ Promoted! Fill in the department and tags.</div>
  <TaskForm initial={promoted} onSave={t=>{setTasks(p=>p.map(x=>x.id===t.id?t:x));setPromoted(null);}} onCancel={()=>setPromoted(null)} contacts={contacts} cats={cats} deptIds={deptIds} tagIds={tagIds} statuses={statuses} tools={tools}/>

// ── Notes ─────────────────────────────────────────────────────────────────────
function Notes({notes,setNotes,cats,tagIds,logActivity,folder}){
  const[showAdd,setShowAdd]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({title:"",content:"",tags:[],pinned:false,folder,attachments:[]});
  const[search,setSearch]=useState("");
  const f_=(k,v)=>setForm(p=>({...p,[k]:v}));
  useEffect(()=>{setForm(p=>({...p,folder}));},[folder]);
  function save(){if(!form.title.trim())return;if(editing){setNotes(p=>p.map(n=>n.id===editing.id?{...n,...form}:n));logActivity(`Updated note "${form.title}"`,"📝");}else{setNotes(p=>[...p,{...form,id:uid(),created:today()}]);logActivity(`Added note "${form.title}"`,"📝");}setShowAdd(false);setEditing(null);}
  function openEdit(n){setForm({...n});setEditing(n);setShowAdd(true);}
  const inFolder=notes.filter(n=>(n.folder||"work")===folder);
  const filtered_=inFolder.filter(n=>!search||n.title.toLowerCase().includes(search.toLowerCase())||n.content.toLowerCase().includes(search.toLowerCase()));
  const pinned=filtered_.filter(n=>n.pinned),rest=filtered_.filter(n=>!n.pinned);
  const RAMPS=[R.blue,R.violet,R.green,R.orange,R.red,R.yellow,R.indigo];
  const[todos,setTodos]=useState(()=>{try{return JSON.parse(localStorage.getItem("fd_todos")||"[]");}catch(e){return[];}});
  const[todoInput,setTodoInput]=useState("");
  function addTodo(){if(!todoInput.trim())return;const t=[...todos,{id:uid(),text:todoInput.trim(),done:false}];setTodos(t);localStorage.setItem("fd_todos",JSON.stringify(t));setTodoInput("");}
  function toggleTodo(id){const t=todos.map(x=>x.id===id?{...x,done:!x.done}:x);setTodos(t);localStorage.setItem("fd_todos",JSON.stringify(t));}
  function deleteTodo(id){const t=todos.filter(x=>x.id!==id);setTodos(t);localStorage.setItem("fd_todos",JSON.stringify(t));}

  return<div style={{padding:"24px 0"}}>
    <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
    {/* ── LEFT: To-Do Today ── */}
    <div style={{width:280,flexShrink:0}}>
  <div style={{fontSize:16,fontWeight:800,color:D.t1,marginBottom:14}}>📌 To-Do Today</div>
  <div style={{display:"flex",gap:6,marginBottom:12}}>
  <input value={todoInput} onChange={e=>setTodoInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTodo()} placeholder="Quick reminder…" className="inp" style={{fontSize:13,padding:"7px 10px"}}/>
  <button onClick={addTodo} style={{background:R.indigo.h,color:"#fff",border:"none",borderRadius:9,padding:"7px 12px",cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>＋</button>
  </div>
  {todos.length===0&&<div style={{color:D.t3,fontSize:13,textAlign:"center",padding:"20px 0",border:`1px dashed ${D.bd}`,borderRadius:9}}>Nothing on the list 🎉</div>}
  <div>
  {todos.map(todo=>(
  <div key={todo.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 10px",borderRadius:9,marginBottom:5,background:todo.done?D.bg1:D.bg2,border:`1px solid ${todo.done?D.bd:R.indigo.b}`,opacity:todo.done?0.55:1,transition:"all 0.2s"}}>
  <input type="checkbox" checked={todo.done} onChange={()=>toggleTodo(todo.id)} style={{marginTop:2,cursor:"pointer",accentColor:R.indigo.h,flexShrink:0}}/>
  <span style={{fontSize:13,color:todo.done?D.t3:D.t1,flex:1,textDecoration:todo.done?"line-through":"none",lineHeight:1.4}}>{todo.text}</span>
  <button onClick={()=>deleteTodo(todo.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:R.red.t,opacity:0.6,flexShrink:0,padding:0}}>🗑</button>
  </div>
  ))}
  </div>
    </div>
    {/* ── RIGHT: Notes ── */}
    <div style={{flex:1,minWidth:0}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
  <div style={{fontSize:22,fontWeight:800,color:D.t1}}>Notes — {folder==="work"?"💼 Work":"🏠 Personal"}</div>
  <Btn onClick={()=>{setForm({title:"",content:"",tags:[],pinned:false,folder,attachments:[]});setEditing(null);setShowAdd(true);}}>＋ New note</Btn>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search notes…" className="inp" style={{marginBottom:16}}/>
    {pinned.length>0&&<div style={{fontSize:10,fontWeight:700,color:D.t3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>📌 Pinned</div>}
    {filtered_.length===0&&<div style={{textAlign:"center",padding:32,color:D.t3,fontSize:14}}>No notes here yet</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))",gap:14}}>
  {[...pinned,...rest].map((n,i)=>{const r=RAMPS[i%RAMPS.length];return(
  <div key={n.id} style={{background:D.bg3,borderRadius:13,padding:"15px 16px",border:`1.5px solid ${r.b}`,borderTop:`3px solid ${r.h}`}}>

  <div style={{fontSize:14,fontWeight:700,color:D.t1}}>{n.title}</div>
  <div style={{display:"flex",gap:4}}>
  <button onClick={()=>setNotes(p=>p.map(x=>x.id===n.id?{...x,pinned:!x.pinned}:x))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:n.pinned?1:0.3}}>📌</button>

  </div>
  </div>
  <div style={{fontSize:13,color:D.t2,lineHeight:1.6,marginBottom:9}}>{n.content}</div>
  <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
  {(n.tags||[]).map(tid=><TagPip key={tid} cats={cats} id={tid}/>)}
  <span style={{fontSize:10,color:D.t3,marginLeft:"auto"}}>{fmtD(n.created)}</span>
  </div>
  </div>
  );})}
    </div>
    </div>{/* end right */}
    </div>{/* end flex */}
    {showAdd&&<Modal title={editing?"Edit note":"New note"} onClose={()=>{setShowAdd(false);setEditing(null);}}>
  <FInp label="Title" value={form.title} onChange={v=>f_("title",v)} placeholder="Note title"/>
  <FTxt label="Content" value={form.content} onChange={v=>f_("content",v)} rows={5}/>
  <FSel label="Folder" value={form.folder||"work"} onChange={v=>f_("folder",v)} opts={[{v:"work",l:"💼 Work"},{v:"personal",l:"🏠 Personal"}]}/>
  <TagPick cats={cats} tagIds={tagIds} value={form.tags||[]} onChange={v=>f_("tags",v)}/>
  <Attach files={form.attachments||[]} onChange={v=>f_("attachments",v)}/>
  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
  <input type="checkbox" id="pin" checked={!!form.pinned} onChange={e=>f_("pinned",e.target.checked)}/><label htmlFor="pin" style={{fontSize:13,fontWeight:600,color:R.indigo.t}}>📌 Pin this note</label>
  </div>
  <div style={{display:"flex",gap:10}}><Btn onClick={save}>{editing?"Save changes":"Save note"}</Btn><Btn variant="ghost" onClick={()=>{setShowAdd(false);setEditing(null);}}>Cancel</Btn></div>
    </Modal>}
  </div>;

// ── Ideas ─────────────────────────────────────────────────────────────────────
function Ideas({ideas,setIdeas,setTasks,logActivity,cats,deptIds,tagIds,statuses}){
  const[showAdd,setShowAdd]=useState(false);
  const[editing,setEditing]=useState(null);
  const[promoted,setPromoted]=useState(null);
  const[form,setForm]=useState({title:"",detail:"",priority:false,attachments:[]});
  const[search,setSearch]=useState("");
  const[dragIdx,setDragIdx]=useState(null);
  const[overIdx,setOverIdx]=useState(null);
  function save(){if(!form.title.trim())return;if(editing)setIdeas(p=>p.map(i=>i.id===editing.id?{...i,...form}:i));else setIdeas(p=>[...p,{...form,id:uid()}]);setShowAdd(false);setEditing(null);}
  function promote(idea){const nt={id:uid(),title:idea.title,deptId:deptIds[0],status:"To Do",flag:"work",type:"Task",priority:idea.priority,due:"",start:today(),tags:[],notes:idea.detail,snoozedUntil:null,attachments:[],tools:[],updates:[]};setTasks(p=>[...p,nt]);setIdeas(p=>p.filter(i=>i.id!==idea.id));logActivity(`Promoted "${idea.title}"`,"🚀");setPromoted(nt);}
  function drop(){if(dragIdx===null||overIdx===null||dragIdx===overIdx){setDragIdx(null);setOverIdx(null);return;}setIdeas(p=>{const a=[...p];const[item]=a.splice(dragIdx,1);a.splice(overIdx,0,item);return a;});setDragIdx(null);setOverIdx(null);}
  const filtered_=ideas.filter(i=>!search||i.title.toLowerCase().includes(search.toLowerCase()));
  const RAMPS=[R.violet,R.indigo,R.blue,R.green,R.yellow,R.orange,R.red];
  return<div style={{padding:"24px 0"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
  <div style={{fontSize:22,fontWeight:800,color:D.t1}}>Future Ideas 💡</div>
  <Btn onClick={()=>{setForm({title:"",detail:"",priority:false,attachments:[]});setEditing(null);setShowAdd(true);}}>＋ Capture idea</Btn>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search ideas…" className="inp" style={{marginBottom:12}}/>

    {filtered_.length===0&&<div style={{textAlign:"center",padding:40,color:D.t3,fontSize:14}}>No ideas yet 🌱</div>}
    {filtered_.map((idea,i)=>{const r=RAMPS[i%RAMPS.length],isOver=overIdx===i&&dragIdx!==i;return(
  <div key={idea.id} draggable onDragStart={()=>setDragIdx(i)} onDragOver={e=>{e.preventDefault();setOverIdx(i);}} onDrop={drop} onDragEnd={()=>{setDragIdx(null);setOverIdx(null);}}
  style={{background:D.bg2,borderRadius:13,padding:"14px 17px",border:`1px solid ${isOver?r.h:r.b}`,borderLeft:`4px solid ${r.h}`,marginBottom:9,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,cursor:"grab",opacity:dragIdx===i?0.5:1}}>
  <div style={{fontSize:17,color:D.t3,cursor:"grab",userSelect:"none",flexShrink:0}}>⠿</div>
  <div style={{flex:1}}>
  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{fontSize:14,fontWeight:700,color:D.t1}}>{idea.title}</div>{idea.priority&&<PBadge/>}</div>
  {idea.detail&&<div style={{fontSize:13,color:D.t2,lineHeight:1.6}}>{idea.detail}</div>}
  </div>
  <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>

// ── ToolsSettings sub-component (hooks must not be in IIFE) ─────────────────
function ToolsSettings({tools,setTools}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({name:"",icon:"🔧"});
  const[editingTool,setEditingTool]=useState(null);
  const ICONS=["🔧","💻","🖥️","📊","📋","🗂️","🚚","📦","🌱","⚙️","🔗","🔌","📡","🛠️","📱","🖨️","💾","🗄️","🔐","📈","🤖","⚡","🌐","📂","🧮"];
  function save(){
    if(!form.name.trim())return;
    if(editingTool){setTools(p=>p.map(t=>t.id===editingTool.id?{...t,...form}:t));}
    else{setTools(p=>[...p,{id:form.name.toLowerCase().replace(/[^a-z0-9]/g,"-")+"-"+uid().slice(-4),name:form.name,icon:form.icon}]);}
    setForm({name:"",icon:"🔧"});setEditingTool(null);setShowForm(false);
  }
  return(
    <div>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,marginTop:10}}>
  <div style={{fontSize:13,fontWeight:700,color:D.t1}}>Tools / Databases</div>
  <Btn sm onClick={()=>{setForm({name:"",icon:"🔧"});setEditingTool(null);setShowForm(true);}}>＋ Add</Btn>
  </div>
  <div style={{fontSize:12,color:D.t2,marginBottom:10}}>These appear as options when creating or editing a task.</div>
  {showForm&&(
  <div style={{background:D.bg3,borderRadius:10,padding:"12px 14px",marginBottom:12,border:`1px solid ${R.teal.b}`}}>
  <Lbl>Pick an icon</Lbl>
  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
  {ICONS.map(em=>(
  <button key={em} type="button" onClick={()=>setForm(f=>({...f,icon:em}))}
  style={{fontSize:20,background:form.icon===em?R.teal.bg:D.bg2,border:`2px solid ${form.icon===em?R.teal.h:D.bd}`,borderRadius:8,padding:"4px 7px",cursor:"pointer",lineHeight:1}}>
  {em}
  </button>
  ))}
  </div>
  <Lbl>Name</Lbl>
  <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="e.g. Salesforce" className="inp" style={{marginBottom:10}}/>
  <div style={{display:"flex",gap:8}}>
  <Btn sm onClick={save}>{editingTool?"Save changes":"Add tool"}</Btn>
  <Btn sm variant="ghost" onClick={()=>{setShowForm(false);setEditingTool(null);}}>Cancel</Btn>
  </div>
  </div>
  )}
  <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}>
  {tools.map(tool=>(
  <div key={tool.id} style={{background:R.teal.bg,border:`1px solid ${R.teal.b}`,borderRadius:9,padding:"6px 13px",display:"flex",alignItems:"center",gap:8}}>
  <span style={{fontSize:12,fontWeight:700,color:R.teal.t}}>{tool.icon} {tool.name}</span>
  <button onClick={()=>{setForm({name:tool.name,icon:tool.icon});setEditingTool(tool);setShowForm(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:R.teal.t,opacity:0.8}}>✏️</button>
  <button onClick={()=>{if(window.confirm(`Delete "${tool.name}"?`))setTools(p=>p.filter(t=>t.id!==tool.id));}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:R.red.t,opacity:0.7}}>🗑</button>
  </div>
  ))}
  </div>
    </div>
  );
}

  <div style={{width:34,height:34,borderRadius:99,background:fl.bg,border:`1px solid ${fl.b}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:fl.t,fontWeight:700}}>{c.name[0]}</div>
  <button onClick={()=>{setForm({...c});setEditing(c);setShowAdd(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:R.blue.t,opacity:0.7}}>✏️</button>
  <button onClick={()=>setContacts(p=>p.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:0.35,color:D.t2}}>🗑</button>
  </div>
  </div>
  {[{icon:"📍",val:c.address},{icon:"📞",val:c.phone},{icon:"✉️",val:c.email},{icon:"🕐",val:c.hours}].filter(r=>r.val).map(r=><div key={r.icon} style={{fontSize:12,color:D.t2,marginBottom:4,display:"flex",gap:7}}><span>{r.icon}</span><span>{r.val}</span></div>)}

// ── App ───────────────────────────────────────────────────────────────────────
const NAV=[{id:"dashboard",l:"Dashboard",icon:"⚡"},{id:"projects",l:"Projects",icon:"🗃️"},{id:"calendar",l:"Calendar",icon:"📅"},{id:"notes",l:"Notes",icon:"📝"},{id:"ideas",l:"Ideas",icon:"💡"}];
const SUB=(active)=>({display:"flex",alignItems:"center",gap:9,padding:"7px 22px 7px 36px",background:active?"rgba(123,111,255,0.1)":"none",border:"none",cursor:"pointer",width:"100%",borderLeft:`3px solid ${active?R.indigo.h:"transparent"}`,transition:"all 0.15s"});

function App(){
  // ── localStorage persistence helpers ────────────────────────────────────────
  function load(key,fallback){try{const v=localStorage.getItem("fd_"+key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
  function save(key,val){try{localStorage.setItem("fd_"+key,JSON.stringify(val));}catch(e){}}

  const[page,setPage]=useState(()=>load("page","dashboard"));
  const[tasks,setTasks]=useState(()=>load("tasks",INIT_TASKS).map(t=>t.status==="Testing"||t.status==="Waiting on Feedback"||t.status==="Pending Feedback"?{...t,status:"In Review"}:t));
  const[events,setEvents]=useState(()=>load("events",INIT_EVENTS));
  const[notes,setNotes]=useState(()=>load("notes",INIT_NOTES));
  const[ideas,setIdeas]=useState(()=>load("ideas",INIT_IDEAS));
  const[contacts,setContacts]=useState(()=>load("contacts",INIT_CONTACTS));
  const[cats,setCats]=useState(()=>load("cats",DEF_CATS));
  const[statuses,setStatuses]=useState(()=>load("statuses",DEF_STATUSES).map(s=>s.id==="testing"&&(s.name==="Testing"||s.name==="Waiting on Feedback"||s.name==="Pending Feedback")?{...s,name:"In Review",icon:"💬"}:s));
  const[tools,setTools]=useState(()=>load("tools",DEF_TOOLS));
  const[filesTab,setFilesTab]=useState(()=>load("filesTab","contacts"));
  const[notesTab,setNotesTab]=useState(()=>load("notesTab","work"));
  const[mobileOpen,setMobileOpen]=useState(false);
  const[saveFlash,setSaveFlash]=useState(false);

  // Auto-save whenever data changes
  useEffect(()=>{save("tasks",tasks);},[tasks]);
  useEffect(()=>{save("events",events);},[events]);
  useEffect(()=>{save("notes",notes);},[notes]);
  useEffect(()=>{save("ideas",ideas);},[ideas]);
  useEffect(()=>{save("contacts",contacts);},[contacts]);
  useEffect(()=>{save("cats",cats);},[cats]);
  useEffect(()=>{save("statuses",statuses);},[statuses]);
  useEffect(()=>{save("tools",tools);},[tools]);
  useEffect(()=>{save("page",page);},[page]);
  useEffect(()=>{save("filesTab",filesTab);},[filesTab]);
  useEffect(()=>{save("notesTab",notesTab);},[notesTab]);

  // Flash "Saved" indicator on any data change
  useEffect(()=>{
    setSaveFlash(true);
    const t=setTimeout(()=>setSaveFlash(false),1200);
    return()=>clearTimeout(t);
  },[tasks,events,notes,ideas,contacts,cats,statuses]);
  const[log,logActivity]=useLog();
  const deptIds=DEF_CATS.slice(0,6).map(c=>c.id);
  const tagIds=DEF_CATS.slice(6).map(c=>c.id);
  const shared={cats,statuses,deptIds,tagIds,logActivity,tools};
  const priCount=tasks.filter(t=>t.priority&&t.status==="In Progress"&&!snoozed(t)).length;
  const blockCount=tasks.filter(t=>t.status==="Roadblock").length;
  function Nav({n}){return<button onClick={()=>{setPage(n.id);setMobileOpen(false);}} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 22px",background:page===n.id?"rgba(123,111,255,0.15)":"none",border:"none",cursor:"pointer",textAlign:"left",width:"100%",borderLeft:`3px solid ${page===n.id?R.indigo.h:"transparent"}`,transition:"all 0.15s"}}><span style={{fontSize:15}}>{n.icon}</span><span style={{fontSize:13,fontWeight:page===n.id?700:500,color:page===n.id?R.indigo.t:D.t2}}>{n.l}</span></button>;}
  return<div style={{display:"flex",minHeight:"100vh",background:D.bg0}}>
    <div id="mbar" style={{display:"none",position:"fixed",top:0,left:0,right:0,zIndex:200,background:D.bg1,padding:"11px 15px",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${D.bd}`}}>
  <div style={{fontSize:22,fontWeight:800,fontFamily:"'Righteous',cursive",background:RB,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FlowDesk</div>
  <button onClick={()=>setMobileOpen(o=>!o)} style={{background:"none",border:"none",color:D.t1,fontSize:22,cursor:"pointer"}}>☰</button>
    </div>
    {mobileOpen&&<div style={{position:"fixed",inset:0,zIndex:150,background:"rgba(0,0,0,0.65)"}} onClick={()=>setMobileOpen(false)}/>}
    <div id="sidebar" style={{width:218,background:D.bg1,flexShrink:0,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",zIndex:100,borderRight:`1px solid ${D.bd}`}}>
  <div style={{height:3,background:RB}}/>
  <div style={{padding:"20px 22px 22px"}}>
  <div style={{fontSize:30,fontWeight:800,fontFamily:"'Righteous',cursive",background:RB,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>FlowDesk</div>
  <div style={{fontSize:12,color:D.t2,marginTop:3,fontWeight:600}}>Your unified workspace</div>
  </div>
  {NAV.map(n=><div key={n.id}><Nav n={n}/>
  {/* Notes sub-folders — always visible */}
  {n.id==="notes"&&<div>
  <button onClick={()=>{setPage("notes");setNotesTab("work");}} style={SUB(page==="notes"&&notesTab==="work")}><span style={{fontSize:13}}>💼</span><span style={{fontSize:12,fontWeight:page==="notes"&&notesTab==="work"?700:400,color:page==="notes"&&notesTab==="work"?R.indigo.t:D.t3}}>Work</span></button>
  <button onClick={()=>{setPage("notes");setNotesTab("personal");}} style={SUB(page==="notes"&&notesTab==="personal")}><span style={{fontSize:13}}>🏠</span><span style={{fontSize:12,fontWeight:page==="notes"&&notesTab==="personal"?700:400,color:page==="notes"&&notesTab==="personal"?R.indigo.t:D.t3}}>Personal</span></button>
  </div>}
  </div>)}
  <div style={{flex:1}}/>
  {/* Master files — always visible sub-nav */}
  <div style={{borderTop:`1px solid ${D.bd}`}}>
  <Nav n={{id:"files",l:"Master Files",icon:"🗄️"}}/>
  <button onClick={()=>{setPage("files");setFilesTab("contacts");}} style={SUB(page==="files"&&filesTab==="contacts")}><span style={{fontSize:13}}>📇</span><span style={{fontSize:12,fontWeight:page==="files"&&filesTab==="contacts"?700:400,color:page==="files"&&filesTab==="contacts"?R.indigo.t:D.t3}}>Contacts</span></button>
  <button onClick={()=>{setPage("files");setFilesTab("system");}} style={SUB(page==="files"&&filesTab==="system")}><span style={{fontSize:13}}>⚙️</span><span style={{fontSize:12,fontWeight:page==="files"&&filesTab==="system"?700:400,color:page==="files"&&filesTab==="system"?R.indigo.t:D.t3}}>System Settings</span></button>
  </div>
  <div style={{padding:"14px 22px",borderTop:`1px solid ${D.bd}`}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
  <div style={{fontSize:10,color:D.t3,textTransform:"uppercase",letterSpacing:"0.06em"}}>Quick stats</div>
  <div style={{fontSize:10,fontWeight:700,color:R.green.t,opacity:saveFlash?1:0,transition:"opacity 0.4s"}}>✓ Saved</div>
  </div>
  <div style={{fontSize:12,color:D.t2,marginBottom:8}}><span style={{color:R.red.t}}>{priCount} priority</span>{" · "}<span style={{color:R.pink.t}}>{blockCount} blocked</span></div>
  <button onClick={()=>{if(!window.confirm("Reset ALL data to defaults? This cannot be undone."))return;["tasks","events","notes","ideas","contacts","cats","statuses","page","filesTab","notesTab"].forEach(k=>localStorage.removeItem("fd_"+k));window.location.reload();}} style={{fontSize:10,color:D.t3,background:"none",border:`1px solid ${D.bd}`,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",width:"100%",opacity:0.6}}>↺ Reset to defaults</button>
  </div>
    </div>
    <div style={{flex:1,overflowY:"auto"}} id="main">
  <div style={{maxWidth:1150,margin:"0 auto",padding:"0 24px"}}>
  {page==="dashboard"&&<Dashboard tasks={tasks} events={events} notes={notes} ideas={ideas} setTasks={setTasks} log={log} {...shared}/>}
  {page==="projects" &&<Projects  tasks={tasks} setTasks={setTasks} contacts={contacts} {...shared}/>}
  {page==="calendar" &&<CalendarView events={events} setEvents={setEvents} contacts={contacts} logActivity={logActivity}/>}
  {page==="notes"    &&<Notes  notes={notes}  setNotes={setNotes} folder={notesTab} {...shared}/>}
  {page==="ideas"    &&<Ideas  ideas={ideas}  setIdeas={setIdeas} setTasks={setTasks} {...shared}/>}
  {page==="files"    &&<MasterFiles contacts={contacts} setContacts={setContacts} cats={cats} setCats={setCats} statuses={statuses} setStatuses={setStatuses} tab={filesTab} tasks={tasks} setTasks={setTasks} tools={tools} setTools={setTools} events={events} notes={notes} ideas={ideas}/>}
  </div>
    </div>
    <style>{`@media(max-width:700px){#sidebar{display:none!important;}#mbar{display:flex!important;}#main{padding-top:54px;}}`}</style>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
